name: Release Asset

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade "ruff>=0.15" "pytest>=9"
          python -m pip install -r requirements_test.txt
          ruff --version

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q sitecustomize.py custom_components scripts tests

      - name: Ruff validation
        shell: bash
        run: |
          set -euo pipefail
          ruff check .

      - name: Ruff format validation
        shell: bash
        run: |
          set -euo pipefail
          ruff format --check .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
        env:
          PYTHONPATH: .

      - name: Build release ZIP (integration root at ZIP root)
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ github.workspace }}/pollenlevels.zip"
          git archive --format=zip --output="${{ github.workspace }}/pollenlevels.zip" HEAD:custom_components/pollenlevels

      - name: Validate ZIP package
        shell: bash
        env:
          EXPECTED_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          python scripts/validate_release_zip.py \
            "${{ github.workspace }}/pollenlevels.zip"

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v3
        with:
          files: pollenlevels.zip
          overwrite_files: true
          fail_on_unmatched_files: true
