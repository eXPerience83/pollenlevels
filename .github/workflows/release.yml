name: Release Asset

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade "black>=25" "ruff>=0.14" "pytest>=8"

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q custom_components tests

      - name: Ruff validation
        shell: bash
        run: |
          set -euo pipefail
          ruff check .

      - name: Black validation
        shell: bash
        run: |
          set -euo pipefail
          black --check .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q
        env:
          PYTHONPATH: .

      - name: Build release ZIP (integration root at ZIP root)
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ github.workspace }}/pollenlevels.zip"
          git archive --format=zip --output="${{ github.workspace }}/pollenlevels.zip" HEAD:custom_components/pollenlevels

      - name: Validate ZIP structure (zip_release-compatible)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import zipfile

          zip_path = "pollenlevels.zip"
          required = {"manifest.json", "__init__.py"}

          with zipfile.ZipFile(zip_path) as zf:
              names = [n for n in zf.namelist() if n and not n.endswith("/")]

          if not names:
              raise SystemExit("ZIP is empty")

          bad_prefix = [n for n in names if n.startswith("custom_components/")]
          if bad_prefix:
              raise SystemExit(
                  "ZIP contains 'custom_components/' prefix; "
                  "zip must be integration-root only"
              )

          generated = [
              n
              for n in names
              if "__pycache__/" in n
              or n.endswith((".pyc", ".pyo"))
              or n.startswith((".pytest_cache/", ".ruff_cache/"))
          ]
          if generated:
              raise SystemExit(
                  "ZIP contains generated/cache files: " + ", ".join(generated)
              )

          missing = sorted(required.difference(names))
          if missing:
              raise SystemExit("ZIP missing required root files: " + ", ".join(missing))

          print("ZIP structure validated.")
          PY

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v3
        with:
          files: pollenlevels.zip
          overwrite_files: true
          fail_on_unmatched_files: true
