name: Package Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: package-test-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade "ruff>=0.15" "pytest>=9"
          python -m pip install -r requirements_test.txt
          ruff --version

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q sitecustomize.py custom_components tests

      - name: Ruff validation
        shell: bash
        run: |
          set -euo pipefail
          ruff check .

      - name: Ruff format validation
        shell: bash
        run: |
          set -euo pipefail
          ruff format --check .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
        env:
          PYTHONPATH: .

      - name: Build release ZIP (integration root at ZIP root)
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ github.workspace }}/pollenlevels.zip"
          git archive --format=zip --output="${{ github.workspace }}/pollenlevels.zip" HEAD:custom_components/pollenlevels

      - name: Validate ZIP package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, sys, zipfile

          zip_path = "pollenlevels.zip"
          REQUIRED = {
              "manifest.json",
              "__init__.py",
              "config_flow.py",
              "client.py",
              "coordinator.py",
              "sensor.py",
              "button.py",
              "diagnostics.py",
              "services.yaml",
              "translations/en.json",
          }

          with zipfile.ZipFile(zip_path) as zf:
              all_names = zf.namelist()
              if not all_names:
                  raise SystemExit("ZIP is empty")

              for name in all_names:
                  if "\\" in name:
                      raise SystemExit(
                          f"Unsafe member path (backslash): {name}"
                      )
                  if os.path.isabs(name):
                      raise SystemExit(
                          f"Unsafe member path (absolute): {name}"
                      )
                  if ".." in name.split("/"):
                      raise SystemExit(
                          f"Unsafe member path (.. traversal): {name}"
                      )

              bad_prefix = [
                  n for n in all_names if n.startswith("custom_components/")
              ]
              if bad_prefix:
                  raise SystemExit(
                      "ZIP contains custom_components/ prefix; "
                      "zip must be integration-root only"
                  )

              generated = []
              cache_dirs = {"__pycache__", ".pytest_cache", ".ruff_cache"}
              for info in zf.infolist():
                  name = info.filename
                  parts = name.split("/")
                  if any(p in cache_dirs for p in parts):
                      generated.append(name)
                  if (
                      not info.is_dir()
                      and name.endswith((".pyc", ".pyo"))
                  ):
                      if name not in generated:
                          generated.append(name)
              if generated:
                  raise SystemExit(
                      "ZIP contains generated/cache files: "
                      + ", ".join(generated)
                  )

              file_names = [i.filename for i in zf.infolist() if not i.is_dir()]

              seen = set()
              dupes = set()
              for name in file_names:
                  if name in seen:
                      dupes.add(name)
                  seen.add(name)
              if dupes:
                  raise SystemExit(
                      "ZIP contains duplicate file members: "
                      + ", ".join(sorted(dupes))
                  )

              missing = sorted(REQUIRED - seen)
              if missing:
                  raise SystemExit(
                      "ZIP missing required root files: "
                      + ", ".join(missing)
                  )

              print("ZIP structure validated.")

              try:
                  manifest_bytes = zf.read("manifest.json")
              except KeyError:
                  raise SystemExit("manifest.json not found in ZIP")

              try:
                  manifest_text = manifest_bytes.decode("utf-8")
              except UnicodeDecodeError as e:
                  raise SystemExit(
                      f"manifest.json is not valid UTF-8: {e}"
                  )

              try:
                  manifest = json.loads(manifest_text)
              except json.JSONDecodeError as e:
                  raise SystemExit(
                      f"manifest.json is not valid JSON: {e}"
                  )

              if not isinstance(manifest, dict):
                  raise SystemExit("manifest.json root is not an object")

              domain = manifest.get("domain")
              if domain != "pollenlevels":
                  raise SystemExit(
                      f"manifest.domain is not 'pollenlevels': {domain!r}"
                  )

              version = manifest.get("version")
              if not isinstance(version, str):
                  raise SystemExit(
                      "manifest.version is not a string: "
                      f"{type(version).__name__}"
                  )
              if not version.strip():
                  raise SystemExit("manifest.version is empty")

              print("manifest.json validated.")

              expected_tag = os.environ.get("EXPECTED_RELEASE_TAG")
              if expected_tag is not None:
                  expected = f"v{version}"
                  if expected_tag != expected:
                      raise SystemExit(
                          "Release tag mismatch: "
                          f"tag={expected_tag!r} != v{version!r}"
                      )
                  print(
                      f"Release tag validated: {expected_tag}"
                      f" == v{version}"
                  )
          PY

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: pollenlevels-zip
          path: pollenlevels.zip
