name: Package Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: package-test-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --upgrade "ruff>=0.15" "pytest>=9"
          python -m pip install -r requirements_test.txt
          ruff --version

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q sitecustomize.py custom_components scripts tests

      - name: Ruff validation
        shell: bash
        run: |
          set -euo pipefail
          ruff check .

      - name: Ruff format validation
        shell: bash
        run: |
          set -euo pipefail
          ruff format --check .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
        env:
          PYTHONPATH: .

      - name: Build release ZIP (integration root at ZIP root)
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${{ github.workspace }}/pollenlevels.zip"
          git archive --format=zip --output="${{ github.workspace }}/pollenlevels.zip" HEAD:custom_components/pollenlevels

      - name: Validate ZIP package
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_release_zip.py \
            "${{ github.workspace }}/pollenlevels.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: pollenlevels-zip
          path: pollenlevels.zip
